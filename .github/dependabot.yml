version: 2
updates:
  # Keep the GitHub Actions used by CI and Release workflows current/secure.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ["*"]

  # Keep Python dependencies (requirements.txt / pyproject.toml) current.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    groups:
      python:
        patterns: ["*"]
