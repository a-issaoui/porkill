name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libfuse2
          pip install python-appimage cairosvg

      - name: Install appimagetool
        run: |
          sudo wget -O /usr/local/bin/appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Build AppImage
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          chmod +x build.sh
          ./build.sh ${{ github.ref_name }}

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build Native Packages (.deb, .rpm)
        env:
          ARCH: ${{ matrix.arch == 'x86_64' && 'amd64' || 'arm64' }}
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION=${VERSION#v} nfpm pkg --packager deb --target .
          VERSION=${VERSION#v} nfpm pkg --packager rpm --target .

      - name: Build Snap
        uses: snapcore/action-build@v1
        with:
          path: .

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            porkill-*.AppImage
            porkill_*.deb
            porkill-*.rpm
            *.snap
            com.github.a_issaoui.porkill.yml
            com.github.a_issaoui.porkill.metainfo.xml
          generate_release_notes: true
          draft: false
          prerelease: false
