name: "porkill"
arch: "${ARCH}"
platform: "linux"
version: "${VERSION}"
section: "utils"
priority: "optional"
maintainer: "a-issaoui <your-email@example.com>"
description: |
  A cyberpunk-themed GUI for monitoring and killing processes by port.
  Zero dependencies, pure Python stdlib. Features matrix rain animation.
vendor: "a-issaoui"
homepage: "https://github.com/a-issaoui/porkill"
license: "MIT"

contents:
  - src: "porkill.py"
    dst: "/usr/bin/porkill"
    type: "file"
    file_info:
      mode: 0755
  - src: "porkill.desktop"
    dst: "/usr/share/applications/porkill.desktop"
  - src: "logo.svg"
    dst: "/usr/share/icons/hicolor/scalable/apps/porkill.svg"
  - src: "porkill.png"
    dst: "/usr/share/icons/hicolor/256x256/apps/porkill.png"

overrides:
  deb:
    depends:
      - python3
      - python3-tk
  rpm:
    depends:
      - python3
      - python3-tkinter
