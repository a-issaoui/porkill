<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Neon green glow -->
    <filter id="neon-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur1"/>
      <feGaussianBlur stdDeviation="7" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Tight glow for fine lines -->
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Red kill glow -->
    <filter id="red-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Center bright glow -->
    <filter id="center-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="12" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Radial gradient for inner scope lens -->
    <radialGradient id="lens-grad" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#0d2a10" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#050d06" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#020502" stop-opacity="1"/>
    </radialGradient>
    <!-- Outer ring gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0b140c"/>
      <stop offset="100%" stop-color="#050805"/>
    </radialGradient>
    <!-- Clip to circle for scope lens -->
    <clipPath id="scope-clip">
      <circle cx="128" cy="128" r="76"/>
    </clipPath>
  </defs>

  <!-- ── Background tile ───────────────────────────────────────── -->
  <rect width="256" height="256" rx="36" fill="url(#bg-grad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.07" stroke="#00ff88" stroke-width="0.5">
    <line x1="64"  y1="0"   x2="64"  y2="256"/>
    <line x1="128" y1="0"   x2="128" y2="256"/>
    <line x1="192" y1="0"   x2="192" y2="256"/>
    <line x1="0"   y1="64"  x2="256" y2="64"/>
    <line x1="0"   y1="128" x2="256" y2="128"/>
    <line x1="0"   y1="192" x2="256" y2="192"/>
  </g>

  <!-- ── Outer scope ring — dim halo ───────────────────────────── -->
  <circle cx="128" cy="128" r="90" fill="none" stroke="#00ff88" stroke-width="12" opacity="0.06"/>
  <circle cx="128" cy="128" r="90" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.25"/>

  <!-- ── Scope tick marks on outer ring ────────────────────────── -->
  <g filter="url(#soft-glow)" stroke="#00ff88" stroke-linecap="round" opacity="0.7">
    <!-- Cardinal long ticks -->
    <line x1="128" y1="34"  x2="128" y2="50"  stroke-width="2.5"/>
    <line x1="128" y1="206" x2="128" y2="222" stroke-width="2.5"/>
    <line x1="34"  y1="128" x2="50"  y2="128" stroke-width="2.5"/>
    <line x1="206" y1="128" x2="222" y2="128" stroke-width="2.5"/>
    <!-- Diagonal short ticks at 45° -->
    <line x1="192" y1="64"  x2="183" y2="73"  stroke-width="1.5" opacity="0.5"/>
    <line x1="64"  y1="64"  x2="73"  y2="73"  stroke-width="1.5" opacity="0.5"/>
    <line x1="64"  y1="192" x2="73"  y2="183" stroke-width="1.5" opacity="0.5"/>
    <line x1="192" y1="192" x2="183" y2="183" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- ── Scope lens fill ────────────────────────────────────────── -->
  <circle cx="128" cy="128" r="76" fill="url(#lens-grad)"/>

  <!-- ── Inner ring ─────────────────────────────────────────────── -->
  <circle cx="128" cy="128" r="76" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.5" filter="url(#soft-glow)"/>

  <!-- ── Scan lines inside scope (clipped) ────────────────────── -->
  <g clip-path="url(#scope-clip)" opacity="0.06">
    <line x1="52"  y1="78"  x2="204" y2="78"  stroke="#00ff88" stroke-width="1"/>
    <line x1="52"  y1="90"  x2="204" y2="90"  stroke="#00ff88" stroke-width="1"/>
    <line x1="52"  y1="102" x2="204" y2="102" stroke="#00ff88" stroke-width="1"/>
    <line x1="52"  y1="114" x2="204" y2="114" stroke="#00ff88" stroke-width="1"/>
    <line x1="52"  y1="126" x2="204" y2="126" stroke="#00ff88" stroke-width="1"/>
    <line x1="52"  y1="138" x2="204" y2="138" stroke="#00ff88" stroke-width="1"/>
    <line x1="52"  y1="150" x2="204" y2="150" stroke="#00ff88" stroke-width="1"/>
    <line x1="52"  y1="162" x2="204" y2="162" stroke="#00ff88" stroke-width="1"/>
    <line x1="52"  y1="174" x2="204" y2="174" stroke="#00ff88" stroke-width="1"/>
  </g>

  <!-- ── Inner range ring ───────────────────────────────────────── -->
  <circle cx="128" cy="128" r="42" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.3" stroke-dasharray="4 6"/>

  <!-- ── Crosshair lines — main ────────────────────────────────── -->
  <g filter="url(#neon-glow)" stroke="#00ff88" stroke-linecap="round">
    <!-- Horizontal — gap at center -->
    <line x1="52"  y1="128" x2="110" y2="128" stroke-width="1.5"/>
    <line x1="146" y1="128" x2="204" y2="128" stroke-width="1.5"/>
    <!-- Vertical — gap at center -->
    <line x1="128" y1="52"  x2="128" y2="110" stroke-width="1.5"/>
    <line x1="128" y1="146" x2="128" y2="204" stroke-width="1.5"/>
  </g>

  <!-- ── Kill X ──────────────────────────────────────────────────── -->
  <g filter="url(#red-glow)" stroke="#ff3030" stroke-linecap="round" stroke-width="7">
    <line x1="101" y1="101" x2="155" y2="155"/>
    <line x1="155" y1="101" x2="101" y2="155"/>
  </g>

  <!-- ── Center reticle dot ─────────────────────────────────────── -->
  <circle cx="128" cy="128" r="5" fill="#ff3030" filter="url(#red-glow)" opacity="0.9"/>
  <circle cx="128" cy="128" r="2.5" fill="#ffffff" opacity="0.95"/>

  <!-- ── Cardinal endpoint dots ─────────────────────────────────── -->
  <g filter="url(#neon-glow)" fill="#00ff88">
    <circle cx="128" cy="52"  r="3"/>
    <circle cx="128" cy="204" r="3"/>
    <circle cx="52"  cy="128" r="3"/>
    <circle cx="204" cy="128" r="3"/>
  </g>

  <!-- ── Outer corner circuit traces ────────────────────────────── -->
  <g stroke="#00ff88" stroke-width="1" opacity="0.3" stroke-linecap="round" fill="none">
    <polyline points="20,52  20,20  52,20"/>
    <polyline points="204,20 236,20 236,52"/>
    <polyline points="236,204 236,236 204,236"/>
    <polyline points="52,236  20,236  20,204"/>
  </g>
  <!-- Corner dots -->
  <g fill="#00ff88" opacity="0.5">
    <circle cx="20"  cy="20"  r="2"/>
    <circle cx="236" cy="20"  r="2"/>
    <circle cx="236" cy="236" r="2"/>
    <circle cx="20"  cy="236" r="2"/>
  </g>
</svg>